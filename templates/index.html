<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Icestasy Order Desk</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-inner">
      <a class="brand" href="/">🍦 Icestasy Order Desk</a>
      <div class="header-right menu-wrap">
        <span class="user-email">{{ user_email }}</span>
        <button class="hamburger-btn" type="button" onclick="toggleMenu()" aria-label="Menu">☰</button>
        <div class="menu-dropdown" id="headerMenu">
          <a class="menu-item" href="/">📊 Dashboard</a>
          <a class="menu-item" href="/change-password">🔑 Change Password</a>
          <a class="menu-item" href="/logout">🚪 Log out</a>
        </div>
      </div>
    </div>
  </header>
  <div class="menu-backdrop" id="menuBackdrop" onclick="toggleMenu()"></div>
  <script>
    function toggleMenu() {
      document.getElementById("headerMenu").classList.toggle("open");
      document.getElementById("menuBackdrop").classList.toggle("open");
    }
    document.addEventListener("click", (e) => {
      const wrap = document.querySelector(".menu-wrap");
      if (wrap && !wrap.contains(e.target)) {
        document.getElementById("headerMenu").classList.remove("open");
        document.getElementById("menuBackdrop").classList.remove("open");
      }
    });
  </script>

  <main class="main">

    <!-- STEP 0: Paste -->
    <section class="step" id="step-paste">
      <div class="step-label">Paste order message</div>
      <textarea id="orderText" class="paste-box" rows="6"
        placeholder="2 Bulk Belgian&#10;3 Square Mango&#10;Advance&#10;Client: Trevor"></textarea>
      <button class="btn-primary" onclick="parseOrder()">Parse Order →</button>
      <button class="btn-ghost mt16" style="width:100%" onclick="startCollateralOnly()">📦 Marketing Collateral Only (no product order)</button>
    </section>

    <!-- STEP 1: Cart review + SKU disambiguation -->
    <section class="step hidden" id="step-cart">
      <div class="step-label">Order Items</div>
      <div id="cartItems"></div>
    </section>

    <!-- STEP 1.5: Marketing Collateral -->
    <section class="step hidden" id="step-collateral">
      <div class="step-label">Marketing Collateral <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--slate-500)">(optional)</span></div>
      <div id="collateralList"></div>
      <button class="btn-option btn-sm mt8" onclick="showCollateralForm()">+ Add collateral</button>
      <button class="btn-primary mt16" onclick="proceedFromCollateral()">Continue →</button>
    </section>

    <!-- STEP 2: Payment -->
    <section class="step hidden" id="step-payment">
      <div class="step-label">Payment Mode</div>
      <div class="btn-group" id="paymentBtns">
        <button class="btn-option" onclick="selectPayment('advance')">Advance</button>
        <button class="btn-option" onclick="selectPayment('invoice')">Invoice</button>
        <button class="btn-option" onclick="selectPayment('credit')">Credit</button>
      </div>
    </section>

    <!-- STEP 3: Client -->
    <section class="step hidden" id="step-client">
      <div class="step-label">Client</div>
      <div class="search-row">
        <input id="clientSearch" class="search-input" type="text" placeholder="Search by name or phone…"
               oninput="debounceSearch(this.value)">
      </div>
      <div class="opt-muted mt8">New client? Ask your Admin to add them from the Clients tab first.</div>
      <div id="clientResults" class="option-list mt8"></div>
    </section>

    <!-- STEP 4: Address -->
    <section class="step hidden" id="step-address">
      <div class="step-label">Shipping Address</div>
      <div id="addressList" class="option-list"></div>
      <button class="btn-option btn-sm mt8" id="addAddressToggleBtn" onclick="showAddressForm()">+ Add new address</button>
    </section>

    <!-- STEP 5: Confirm -->
    <section class="step hidden" id="step-confirm">
      <div class="step-label">Order Summary</div>
      <div id="summaryBox" class="summary-box"></div>
      <button class="btn-primary btn-green" onclick="placeOrder()">✓ Confirm &amp; Place Order</button>
      <button class="btn-ghost mt8" onclick="resetAll()">Cancel</button>
    </section>

    <!-- STEP 6: Done -->
    <section class="step hidden" id="step-done">
      <div id="doneBox" class="done-box"></div>
    </section>

  </main>
</div>

<script>
// ── State ───────────────────────────────────────────────────────────────────
let state = {
  items: [],        // [{qty, resolved_sku, unit_price, ambiguous, candidates}]
  payment: null,
  client: null,
  address_id: null,
  address_label: null,
  collateral: [],    // [{type, quantity, notes}]
  collateralOnly: false,
};
let searchTimer = null;
const COLLATERAL_TYPES = ["Tent Cards","Acrylic Tent Cards","Acrylic Stands","Inserts (for Acrylic)","Posters","Flyers"];

// ── Helpers ─────────────────────────────────────────────────────────────────
const fmt = n => "₹" + Number(n).toLocaleString("en-IN", {minimumFractionDigits: 2, maximumFractionDigits: 2});
const show = id => document.getElementById(id).classList.remove("hidden");
const hide = id => document.getElementById(id).classList.add("hidden");

function resetAll() {
  state = {items: [], payment: null, client: null, address_id: null, address_label: null,
           collateral: [], collateralOnly: false};
  ["step-cart","step-collateral","step-payment","step-client","step-address","step-confirm","step-done"]
    .forEach(hide);
  document.getElementById("orderText").value = "";
  document.getElementById("clientSearch").value = "";
  document.getElementById("clientSearch").style.display = "";
  document.getElementById("clientResults").innerHTML = "";
  document.getElementById("addressList").innerHTML = "";
  document.getElementById("addAddressToggleBtn").style.display = "";
  document.getElementById("collateralList").innerHTML = "";
  show("step-paste");
}

// ── Marketing Collateral ────────────────────────────────────────────────────
function startCollateralOnly() {
  state.items = [];
  state.collateralOnly = true;
  hide("step-paste");
  show("step-collateral");
  renderCollateralList();
}

function renderCollateralList() {
  const box = document.getElementById("collateralList");
  if (!state.collateral.length) {
    box.innerHTML = `<div class="opt-muted">No collateral added yet</div>`;
    return;
  }
  box.innerHTML = state.collateral.map((c, idx) => `
    <div class="cart-item-card">
      <div class="ci-info">
        <span class="ci-name">${c.type}</span>
        <span class="ci-fmt">Qty: ${c.quantity}${c.notes ? " · " + c.notes : ""}</span>
      </div>
      <button class="qty-btn" onclick="removeCollateral(${idx})">✕</button>
    </div>`).join("");
}

function showCollateralForm() {
  const box = document.getElementById("collateralList");
  const typeOpts = COLLATERAL_TYPES.map(t => `<option value="${t}">${t}</option>`).join("");
  box.insertAdjacentHTML("beforeend", `
    <div class="register-form mt8" id="collateralForm">
      <select id="colType" class="search-input">${typeOpts}</select>
      <input id="colQty" class="search-input mt8" type="number" min="1" value="1" placeholder="Quantity *">
      <textarea id="colNotes" class="paste-box mt8" rows="2" placeholder="Notes / specification (optional)"></textarea>
      <div id="colError" class="opt-error mt8"></div>
      <div class="btn-group mt8">
        <button class="btn-primary" onclick="addCollateralLine()">Add</button>
        <button class="btn-ghost" onclick="renderCollateralList()">Cancel</button>
      </div>
    </div>`);
}

function addCollateralLine() {
  const qty = parseInt(document.getElementById("colQty").value, 10);
  const errBox = document.getElementById("colError");
  if (!qty || qty < 1) {
    errBox.textContent = "Enter a valid quantity";
    return;
  }
  state.collateral.push({
    type: document.getElementById("colType").value,
    quantity: qty,
    notes: document.getElementById("colNotes").value.trim(),
  });
  renderCollateralList();
}

function removeCollateral(idx) {
  state.collateral.splice(idx, 1);
  renderCollateralList();
}

function proceedFromCollateral() {
  if (state.collateral.length === 0) {
    if (state.collateralOnly) {
      alert("Add at least one marketing collateral item to proceed.");
      return;
    }
    if (!confirm("Are you sure you want to proceed without adding marketing collateral?")) return;
  }
  hide("step-collateral");

  if (state.collateralOnly) {
    state.payment = null;
    show("step-client");
    if (document.getElementById("clientSearch").value.length >= 2) {
      _searchClients(document.getElementById("clientSearch").value);
    }
    return;
  }

  show("step-payment");
  if (state.payment) {
    markPayment(state.payment);
    const label = document.getElementById("paymentBtns");
    if (!document.getElementById("payment-auto-note")) {
      const note = document.createElement("div");
      note.id = "payment-auto-note";
      note.style.cssText = "font-size:12px;color:#1D9E75;margin-top:6px";
      note.textContent = "Auto-detected from message — tap to change";
      label.parentNode.appendChild(note);
    }
    setTimeout(() => {
      hide("step-payment");
      document.getElementById("payment-auto-note")?.remove();
      show("step-client");
      const q = document.getElementById("clientSearch").value;
      if (q.length >= 2) _searchClients(q);
    }, 1500);
  }
}

// ── STEP 0: Parse ───────────────────────────────────────────────────────────
async function parseOrder() {
  const text = document.getElementById("orderText").value.trim();
  if (!text) return;
  const btn = document.querySelector("#step-paste .btn-primary");
  btn.disabled = true; btn.textContent = "Parsing…";
  let res;
  try {
    res = await fetch("/api/parse", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({text}),
    }).then(r => r.json());
  } finally {
    btn.disabled = false; btn.textContent = "Parse Order →";
  }

  if (!res.items || !res.items.length) {
    alert("Could not detect any items. Check the format:\n2 Bulk Belgian\n3 Square Mango");
    return;
  }

  state.items = res.items.map(i => ({...i}));
  state.payment = res.payment || null;

  hide("step-paste");
  renderCart();
  show("step-cart");

  // Pre-fill client search if hint provided
  if (res.client_hint) {
    document.getElementById("clientSearch").value = res.client_hint;
  }
}

// ── STEP 1: Cart ─────────────────────────────────────────────────────────────
function renderCart() {
  const box = document.getElementById("cartItems");
  box.innerHTML = "";

  let allResolved = true;

  state.items.forEach((item, idx) => {
    const div = document.createElement("div");
    div.className = "cart-item-card";

    if (item.not_found) {
      div.innerHTML = `<div class="ambig-label" style="color:#c0392b">⚠ No SKU found for item ${idx + 1} (qty: ${item.qty}) — not in active catalogue</div>`;
      allResolved = false;
    } else if (!item.ambiguous && item.resolved_sku) {
      const sku = item.resolved_sku;
      const total = item.qty * item.unit_price;
      div.innerHTML = `
        <div class="ci-info">
          <span class="ci-name">${sku.flavour_name}</span>
          <span class="ci-fmt">${sku.pack_format_name}</span>
        </div>
        <div class="ci-right">
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty(${idx},-1)">−</button>
            <span class="qty-val" id="qty-${idx}">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${idx},1)">+</button>
          </div>
          <span class="ci-price" id="price-${idx}">${fmt(total)}</span>
        </div>`;
    } else {
      // Ambiguous — show candidate buttons
      allResolved = false;
      const candidates = item.candidates.map((c, ci) => `
        <button class="btn-option btn-sm" onclick="resolveSku(${idx},${ci})">
          ${c.flavour_name} — ${c.pack_format_name} (${fmt(c.unit_price)})
        </button>`).join("");
      div.innerHTML = `
        <div class="ambig-label">⚠ Select SKU for item ${idx + 1} (qty: ${item.qty})</div>
        <div class="btn-group vertical">${candidates}</div>`;
    }

    box.appendChild(div);
  });

  const proceedable = state.items.every(i => i.not_found || (!i.ambiguous && i.resolved_sku));
  if (proceedable) {
    const sub = state.items.filter(i => !i.not_found && i.resolved_sku).reduce((s,i) => s + i.qty * i.unit_price, 0);
    box.innerHTML += `<div class="subtotal-row">Subtotal <strong>${fmt(sub)}</strong></div>`;
    renderNextAfterCart();
  }
}

function changeQty(idx, delta) {
  state.items[idx].qty = Math.max(1, state.items[idx].qty + delta);
  renderCart();
}

function resolveSku(itemIdx, candidateIdx) {
  const item = state.items[itemIdx];
  const sku = item.candidates[candidateIdx];
  item.resolved_sku = sku;
  item.unit_price = sku.unit_price;
  item.ambiguous = false;
  renderCart();
}

function renderNextAfterCart() {
  show("step-collateral");
  renderCollateralList();
}

// ── STEP 2: Payment ──────────────────────────────────────────────────────────
function selectPayment(mode) {
  state.payment = mode;
  document.querySelectorAll("#paymentBtns .btn-option").forEach(b => b.classList.remove("active"));
  document.querySelectorAll("#paymentBtns .btn-option")
    .forEach(b => { if (b.textContent.toLowerCase().trim() === mode) b.classList.add("active"); });
  hide("step-payment");
  show("step-client");
  if (document.getElementById("clientSearch").value.length >= 2) {
    _searchClients(document.getElementById("clientSearch").value);
  }
}

function markPayment(mode) {
  // Payment was pre-filled — don't show step but mark label
  document.querySelectorAll("#paymentBtns .btn-option")
    .forEach(b => { if (b.textContent.toLowerCase().trim() === mode) b.classList.add("active"); });
}

// ── STEP 3: Client ───────────────────────────────────────────────────────────
function debounceSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => _searchClients(val), 300);
}

async function _searchClients(q) {
  const box = document.getElementById("clientResults");
  if (q.length < 2) { box.innerHTML = ""; return; }
  box.innerHTML = `<div class="searching">Searching…</div>`;
  const data = await fetch(`/api/clients/search?q=${encodeURIComponent(q)}`).then(r => r.json());
  if (data.error) {
    box.innerHTML = `<div class="opt-error">⚠ ${data.error}</div>`;
    return;
  }
  const clients = data.clients || [];
  if (!clients.length) {
    box.innerHTML = `<div class="opt-muted">No match for "<strong>${q}</strong>" — try business name, phone, or contact name, or ask your Admin to add this client from the Clients tab</div>`;
    return;
  }
  box.innerHTML = clients.map(c => `
    <button class="option-btn" onclick='selectClient(${JSON.stringify(c).replace(/'/g,"&#39;")})'>
      <span class="opt-name">${c.business_name}</span>
      <span class="opt-sub">${c.primary_contact_name ? c.primary_contact_name + " · " : ""}${c.primary_contact_phone || ""}</span>
    </button>`).join("");
}

async function selectClient(client) {
  state.client = client;
  document.getElementById("clientResults").innerHTML =
    `<div class="selected-pill">✓ ${client.business_name} <button class="pill-change" onclick="changeClient()">change</button></div>`;
  document.getElementById("clientSearch").style.display = "none";

  hide("step-client");
  await loadAddresses(client.id);
  show("step-address");
}

async function loadAddresses(clientId) {
  const data = await fetch(`/api/clients/${clientId}/addresses`).then(r => r.json());
  const addrs = data.addresses || [];
  const box = document.getElementById("addressList");
  if (!addrs.length) {
    box.innerHTML = `<div class="opt-muted">No addresses found — add one below, or skip</div>
      <button class="btn-ghost mt8" onclick="skipAddress()">Skip for now</button>`;
  } else {
    box.innerHTML = addrs.map(a => `
      <button class="option-btn" onclick="selectAddress(${a.id}, '${a.label.replace(/'/g,"\\'")}')">
        ${a.label}
      </button>`).join("");
  }
}

function skipAddress() {
  state.address_id = null;
  state.address_label = null;
  hide("step-address");
  showConfirm();
}

const CITIES_BY_STATE = {
  "Maharashtra": ["Mumbai", "Pune", "Nagpur", "Nashik", "Thane", "Aurangabad", "Vile Parle", "Andheri", "Navi Mumbai"],
  "Gujarat": ["Ahmedabad", "Surat", "Vadodara", "Rajkot", "Bhavnagar"],
  "Karnataka": ["Bengaluru", "Mysuru", "Mangaluru", "Hubballi"],
  "Delhi": ["New Delhi"],
  "Tamil Nadu": ["Chennai", "Coimbatore", "Madurai", "Tiruchirappalli"],
  "Telangana": ["Hyderabad", "Warangal"],
  "West Bengal": ["Kolkata", "Howrah", "Durgapur"],
  "Rajasthan": ["Jaipur", "Jodhpur", "Udaipur", "Kota"],
  "Uttar Pradesh": ["Lucknow", "Noida", "Ghaziabad", "Kanpur", "Agra", "Varanasi"],
  "Madhya Pradesh": ["Bhopal", "Indore", "Jabalpur", "Gwalior"],
  "Punjab": ["Chandigarh", "Ludhiana", "Amritsar", "Jalandhar"],
  "Haryana": ["Gurugram", "Faridabad", "Panipat"],
  "Kerala": ["Kochi", "Thiruvananthapuram", "Kozhikode"],
  "Goa": ["Panaji", "Margao"],
  "Andhra Pradesh": ["Visakhapatnam", "Vijayawada", "Guntur"],
  "Bihar": ["Patna", "Gaya"],
  "Odisha": ["Bhubaneswar", "Cuttack"],
  "Chhattisgarh": ["Raipur", "Bhilai"],
  "Jharkhand": ["Ranchi", "Jamshedpur"],
  "Assam": ["Guwahati"],
  "Uttarakhand": ["Dehradun", "Haridwar"],
  "Himachal Pradesh": ["Shimla"],
  "Jammu and Kashmir": ["Srinagar", "Jammu"],
  "Chandigarh": ["Chandigarh"],
  "Puducherry": ["Puducherry"],
};
const INDIA_STATES = ["Maharashtra","Gujarat","Karnataka","Delhi","Tamil Nadu","Telangana","West Bengal",
  "Rajasthan","Uttar Pradesh","Madhya Pradesh","Punjab","Haryana","Kerala","Goa","Andhra Pradesh","Bihar",
  "Odisha","Chhattisgarh","Jharkhand","Assam","Uttarakhand","Himachal Pradesh","Jammu and Kashmir",
  "Chandigarh","Puducherry","Sikkim","Arunachal Pradesh","Nagaland","Manipur","Mizoram","Tripura",
  "Meghalaya","Daman and Diu","Dadra and Nagar Haveli","Lakshadweep","Andaman and Nicobar Islands","Ladakh"];

function showAddressForm() {
  const box = document.getElementById("addressList");
  document.getElementById("addAddressToggleBtn").style.display = "none";
  const stateOpts = `<option value="">Select state *</option>` +
    INDIA_STATES.map(s => `<option value="${s}">${s}</option>`).join("");
  box.innerHTML = `
    <div class="register-form">
      <input id="addrLine1" class="search-input" placeholder="Address line 1 *">
      <input id="addrLine2" class="search-input mt8" placeholder="Address line 2 (optional)">
      <select id="addrState" class="search-input mt8" onchange="updateCityOptions()">${stateOpts}</select>
      <select id="addrCity" class="search-input mt8"><option value="">Select state first</option></select>
      <input id="addrCityOther" class="search-input mt8" placeholder="City name" style="display:none">
      <input id="addrPincode" class="search-input mt8" placeholder="Pincode *">
      <select id="addrType" class="search-input mt8">
        <option value="shipping">Shipping</option>
        <option value="billing">Billing</option>
      </select>
      <div id="addrError" class="opt-error mt8"></div>
      <div class="btn-group mt8">
        <button class="btn-primary" onclick="submitAddress()">Save &amp; Select</button>
        <button class="btn-ghost" onclick="cancelAddressForm()">Cancel</button>
      </div>
    </div>`;
}

function updateCityOptions() {
  const stateName = document.getElementById("addrState").value;
  const citySel = document.getElementById("addrCity");
  const cityOther = document.getElementById("addrCityOther");
  cityOther.style.display = "none";
  cityOther.value = "";
  const cities = CITIES_BY_STATE[stateName] || [];
  citySel.innerHTML = `<option value="">Select city *</option>` +
    cities.map(c => `<option value="${c}">${c}</option>`).join("") +
    `<option value="__other__">Other (type manually)</option>`;
  citySel.onchange = () => {
    if (citySel.value === "__other__") {
      cityOther.style.display = "";
    } else {
      cityOther.style.display = "none";
      cityOther.value = "";
    }
  };
}

function cancelAddressForm() {
  document.getElementById("addAddressToggleBtn").style.display = "";
  loadAddresses(state.client.id);
}

async function submitAddress() {
  const errBox = document.getElementById("addrError");
  const citySel = document.getElementById("addrCity").value;
  const city = citySel === "__other__" ? document.getElementById("addrCityOther").value.trim() : citySel;
  const payload = {
    line1: document.getElementById("addrLine1").value.trim(),
    line2: document.getElementById("addrLine2").value.trim(),
    city: city,
    state: document.getElementById("addrState").value.trim(),
    pincode: document.getElementById("addrPincode").value.trim(),
    address_type: document.getElementById("addrType").value,
  };
  if (!payload.line1 || !payload.city || !payload.state || !payload.pincode) {
    errBox.textContent = "Address line, city, state, and pincode are required";
    return;
  }
  const res = await fetch(`/api/clients/${state.client.id}/addresses`, {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify(payload),
  }).then(r => r.json());
  if (!res.ok) {
    errBox.textContent = res.error || "Could not save address";
    return;
  }
  selectAddress(res.address.id, res.address.label);
}

function changeClient() {
  state.client = null;
  document.getElementById("clientSearch").style.display = "";
  document.getElementById("clientResults").innerHTML = "";
  document.getElementById("clientSearch").value = "";
  document.getElementById("clientSearch").focus();
}

// ── STEP 4: Address ──────────────────────────────────────────────────────────
function selectAddress(id, label) {
  state.address_id = id;
  state.address_label = label;
  document.getElementById("addressList").innerHTML =
    `<div class="selected-pill">✓ ${label} <button class="pill-change" onclick="changeAddress()">change</button></div>`;
  document.getElementById("addAddressToggleBtn").style.display = "none";
  hide("step-address");
  showConfirm();
}

function changeAddress() {
  state.address_id = null;
  document.getElementById("addAddressToggleBtn").style.display = "";
  loadAddresses(state.client.id);
  show("step-address");
  hide("step-confirm");
}

// ── STEP 5: Confirm ──────────────────────────────────────────────────────────
function showConfirm() {
  const resolved = state.items.filter(i => !i.not_found && i.resolved_sku);
  const subtotal = resolved.reduce((s,i) => s + i.qty * i.unit_price, 0);
  const itemRows = resolved.map(i =>
    `<tr><td>${i.resolved_sku.flavour_name}</td><td>${i.resolved_sku.pack_format_name}</td>
     <td class="num">${i.qty}</td><td class="num">${fmt(i.unit_price)}</td>
     <td class="num">${fmt(i.qty * i.unit_price)}</td></tr>`
  ).join("");

  const collateralRows = state.collateral.map(c =>
    `<div class="summary-row"><span>${c.type}${c.notes ? " (" + c.notes + ")" : ""}</span><strong>Qty ${c.quantity}</strong></div>`
  ).join("");

  document.getElementById("summaryBox").innerHTML = `
    <div class="summary-row"><span>Client</span><strong>${state.client?.business_name || "—"}</strong></div>
    ${state.collateralOnly ? "" : `<div class="summary-row"><span>Payment</span><strong>${(state.payment||"").replace(/^\w/,c=>c.toUpperCase())}</strong></div>`}
    <div class="summary-row"><span>Address</span><strong>${state.address_label || "Not set"}</strong></div>
    ${resolved.length ? `<table class="summary-table">
      <thead><tr><th>Item</th><th>Format</th><th>Qty</th><th>Unit</th><th>Total</th></tr></thead>
      <tbody>${itemRows}</tbody>
    </table>` : ""}
    ${collateralRows ? `<div class="step-label mt16">Marketing Collateral</div>${collateralRows}` : ""}
    <div class="summary-total">Total <strong>${fmt(subtotal)}</strong></div>`;
  show("step-confirm");
}

// ── STEP 6: Place ────────────────────────────────────────────────────────────
async function placeOrder() {
  const btn = document.querySelector("#step-confirm .btn-green");
  btn.disabled = true; btn.textContent = "Placing…";

  const lines = state.items.filter(i => !i.not_found && i.resolved_sku).map(i => ({
    sku_id: i.resolved_sku.id,
    sku_code: i.resolved_sku.sku_code,
    flavour_name: i.resolved_sku.flavour_name,
    format_name: i.resolved_sku.pack_format_name,
    quantity: i.qty,
    unit_price: i.unit_price,
    line_discount: 0,
  }));

  const res = await fetch("/api/orders", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      client_id: state.client.id,
      payment_mode: state.payment,
      lines,
      shipping_address_id: state.address_id,
      billing_address_id: state.address_id,
      collateral: state.collateral,
    }),
  }).then(r => r.json());

  btn.disabled = false; btn.textContent = "✓ Confirm & Place Order";
  hide("step-confirm");

  if (res.ok) {
    const order = res.order;
    const total = fmt(order.total);
    const linesList = (order.lines || []).map(l =>
      `<li>${l.quantity} × ${l.flavour_name} ${l.format_name} — ${fmt(l.line_total)}</li>`
    ).join("") + (order.collateral || []).map(c =>
      `<li>${c.quantity} × ${c.type}${c.notes ? " — " + c.notes : ""}</li>`
    ).join("");
    document.getElementById("doneBox").innerHTML = `
      <div class="done-icon">✅</div>
      <div class="done-title">Order Confirmed</div>
      <div class="done-no">${order.order_no}</div>
      <div class="done-meta">${state.client.business_name}${state.payment ? " · " + state.payment.replace(/^\w/,c=>c.toUpperCase()) : ""}</div>
      <ul class="done-lines">${linesList}</ul>
      <div class="done-total">Total: <strong>${total}</strong></div>
      <button class="btn-primary mt16" onclick="resetAll()">New Order</button>`;
    show("step-done");
  } else {
    alert("Order failed: " + (res.error || "Unknown error"));
    show("step-confirm");
  }
}
</script>
