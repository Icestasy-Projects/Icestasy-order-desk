<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Change Password · Icestasy Order Desk</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
<div class="login-card">
  <div class="login-badge">🔑</div>
  <h1 class="login-title">Change Password</h1>
  <p class="login-sub">{{ "Set a new password to continue — this is a default account password and must be changed before you can use the app." if forced else "Choose a new password for your account." }}</p>

  {% if error %}
  <div class="opt-error login-error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/change-password" class="login-form">
    <label class="login-label" for="password">New password</label>
    <input class="search-input" id="password" name="password" type="password" required minlength="8" autocomplete="new-password" autofocus>

    <label class="login-label mt8" for="confirm">Confirm new password</label>
    <input class="search-input" id="confirm" name="confirm" type="password" required minlength="8" autocomplete="new-password">

    <button class="btn-primary mt16" type="submit">Update Password</button>
  </form>
</div>
</body>
</html>
